plugins {
    id 'application'
}

repositories {
    mavenCentral()
}

dependencies {
    implementation("org.seleniumhq.selenium:selenium-java:4.42.0")
    testImplementation("org.testng:testng:7.12.0")

}
application{
   mainClass='org.example.Main'
}

test{
    TestNG()
}

tasks.register('prepareDocs',Copy) {
description='Copies HTML, CSS, and images to docs folder.'
    group='documentaion'
    from('src/main/resources/website') {
        include '**/*.html', '**/*.css', '**/*.png'
    }
    into("rootDir/docs")
    }
